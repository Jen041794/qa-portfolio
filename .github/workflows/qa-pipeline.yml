name: QA Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  # Job 1пЉЪUnit Tests + Coverage
  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage.xml

  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  # Job 2пЉЪAPI Integration Tests
  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests   # unit ?Ъй??Ни? API

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API tests
        run: pytest tests/api/ -v --tb=short

  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  # Job 3пЉЪE2E TestsпЉИе??Хз?еѓ?serverпЉ?  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: api-tests   # API ?Ъй??Ни? E2E

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Start Flask server in background
        run: |
          python run.py &
          sleep 3   # з≠Йе? server ?Яе?

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=short

      - name: Upload E2E test results
        if: always()   # е§±ж??Вд?дЄКеВ≥зµРж?
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: reports/

  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  # Job 4пЉЪжЄђи©¶ж?и¶БйАЪзЯ•пЉИж???job еЃМж?еЊМп?
  # ?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А?А
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, e2e-tests]
    if: always()

    steps:
      - name: Report status
        run: |
          echo "Unit Tests:  ${{ needs.unit-tests.result }}"
          echo "API Tests:   ${{ needs.api-tests.result }}"
          echo "E2E Tests:   ${{ needs.e2e-tests.result }}"
